replicaCount: 1

image:
  repository: ghcr.io/zang-lab/bartweb_frontend
  pullPolicy: Always
  tag: prod-0.0.4

imagePullSecrets:
  - name: ghcr-regcred-bartweb

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

resources:
  limits:
    cpu: 1
    memory: 2Gi
  requests:
    cpu: 0.5
    memory: 1Gi