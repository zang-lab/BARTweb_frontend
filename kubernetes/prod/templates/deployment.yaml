apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bartweb.fullname" . }}-app
  labels:
    {{- include "bartweb.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      {{- include "bartweb.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "bartweb.labels" . | nindent 8 }}

    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}

      # ✅ FIX: prevent /usercase/log crash
      initContainers:
        - name: fix-permissions
          image: busybox
          command:
            - sh
            - -c
            - |
              mkdir -p /BARTweb/usercase/log
              chmod -R 777 /BARTweb/usercase
          volumeMounts:
            - name: usercase-volume
              mountPath: /BARTweb/usercase

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            # App storage
            - name: usercase-volume
              mountPath: /BARTweb/usercase

            # ✅ FIX: SSH key mount (was missing)
            - name: ssh-key-volume
              mountPath: /etc/ssh-key
              readOnly: true

      volumes:
        # PVC
        {{- if .Values.usercase.usePVC }}
        - name: usercase-volume
          persistentVolumeClaim:
            claimName: {{ .Values.usercase.pvcName }}
        {{- else }}
        - name: usercase-volume
          hostPath:
            path: {{ .Values.usercase.hostPath }}
            type: DirectoryOrCreate
        {{- end }}

        # SSH Secret
        - name: ssh-key-volume
          secret:
            secretName: cz3d-ssh-key
            defaultMode: 0400

      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}

      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}

      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}