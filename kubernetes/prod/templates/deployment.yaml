apiVersion: apps/v1
kind: Deployment
metadata:
  name: bartweb-app
  namespace: zanglab
  labels:
    app.kubernetes.io/instance: bartweb
    app.kubernetes.io/name: bartweb

spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/instance: bartweb
      app.kubernetes.io/name: bartweb

  template:
    metadata:
      labels:
        app.kubernetes.io/instance: bartweb
        app.kubernetes.io/name: bartweb

    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      imagePullSecrets:
        - name: ghcr-regcred-bartweb

      containers:
        - name: bartweb
          image: ghcr.io/zang-lab/bartweb_frontend:prod-0.0.5
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          resources:
            limits:
              cpu: "1"
              memory: "2Gi"
            requests:
              cpu: "500m"
              memory: "1Gi"

          volumeMounts:
            - name: usercase-volume
              mountPath: /BARTweb/usercase

            - name: ssh-key-volume
              mountPath: /etc/ssh-key
              readOnly: true

      volumes:
        - name: usercase-volume
          persistentVolumeClaim:
            claimName: bartweb-usercase-pvc

        - name: ssh-key-volume
          secret:
            secretName: cz3d-ssh-key
            defaultMode: 0400