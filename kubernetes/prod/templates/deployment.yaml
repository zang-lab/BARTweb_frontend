apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bartweb.fullname" . }}-app
  namespace: zanglab
  labels:
    app.kubernetes.io/instance: bartweb
    app.kubernetes.io/name: bartweb

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app.kubernetes.io/instance: bartweb
      app.kubernetes.io/name: bartweb

  template:
    metadata:
      labels:
        app.kubernetes.io/instance: bartweb
        app.kubernetes.io/name: bartweb

    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      imagePullSecrets:
        - name: ghcr-regcred-bartweb

      containers:
        - name: bartweb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.service.targetPort }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            - name: usercase-volume
              mountPath: /BARTweb/usercase

            - name: ssh-key-volume
              mountPath: /etc/ssh-key
              readOnly: true

      volumes:
        - name: usercase-volume
          persistentVolumeClaim:
            claimName: {{ .Values.usercase.pvcName }}

        - name: ssh-key-volume
          secret:
            secretName: cz3d-ssh-key
            defaultMode: 0400