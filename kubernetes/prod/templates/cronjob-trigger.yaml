apiVersion: batch/v1
kind: CronJob
metadata:
  name: bartweb-trigger-cronjob
  namespace: zanglab
spec:
  schedule: "0 * * * *"  # every hour
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: bartweb-trigger-container
              image: ghcr.io/uvarc/uvarc-unified-service-base:develop
              imagePullPolicy: Always
              command: ["python3", "/BARTweb/trigger.py"]
              volumeMounts:
                # SSH key secret for HPC
                - name: ssh-key-volume
                  mountPath: /etc/ssh-key
                # PVC for trigger.py and usercase directory
                - name: usercase-pvc
                  mountPath: /BARTweb
              env:
                - name: USERID
                  value: "cz3d"
              resources:
                limits:
                  cpu: "0.5"
                  memory: 512Mi
                requests:
                  cpu: "0.5"
                  memory: 512Mi
          volumes:
            - name: ssh-key-volume
              secret:
                secretName: cz3d-ssh-key
                defaultMode: 256
            - name: usercase-pvc
              persistentVolumeClaim:
                claimName: bartweb-usercase-pvc  # the PVC that should contain trigger.py
          restartPolicy: OnFailure
      ttlSecondsAfterFinished: 86400