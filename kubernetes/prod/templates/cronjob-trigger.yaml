apiVersion: batch/v1
kind: CronJob
metadata:
  name: bartweb-trigger-cronjob
  namespace: zanglab

spec:
  schedule: "0 * * * *"

  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure

          securityContext:
            runAsUser: 1000
            fsGroup: 1000

          containers:
            - name: bartweb-trigger-container
              image: ghcr.io/uvarc/uvarc-unified-service-base:develop
              imagePullPolicy: Always

              command:
                - python3
                - /BARTweb/usercase/trigger.py

              env:
                - name: USERID
                  value: "cz3d"

              resources:
                limits:
                  cpu: "0.5"
                  memory: 512Mi
                requests:
                  cpu: "0.5"
                  memory: 512Mi

              volumeMounts:
                - name: trigger-script
                  mountPath: /BARTweb/usercase/trigger.py
                  subPath: trigger.py

                - name: ssh-key-volume
                  mountPath: /etc/ssh-key
                  readOnly: true

          volumes:
            - name: trigger-script
              configMap:
                name: bartweb-trigger-script

            - name: ssh-key-volume
              secret:
                secretName: cz3d-ssh-key
                defaultMode: 0400

          nodeSelector: {}