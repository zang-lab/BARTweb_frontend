apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "bartweb.fullname" . }}-trigger-cronjob
  labels:
    {{- include "bartweb.labels" . | nindent 4 }}
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: bartweb-trigger-container
              image: ghcr.io/uvarc/uvarc-unified-service-base:develop
              imagePullPolicy: Always
              command: ["python3", "/BARTweb/trigger.py"]
              volumeMounts:
                - name: ssh-key-volume
                  mountPath: "/etc/ssh-key"
              env:
                - name: USERID
                  value: "cz3d"
              resources:
                limits:
                  cpu: "0.5"
                  memory: 512Mi
                requests:
                  cpu: "0.5"
                  memory: 512Mi
          volumes:
            - name: ssh-key-volume
              secret:
                secretName: cz3d-ssh-key
                defaultMode: 256
          restartPolicy: OnFailure
      ttlSecondsAfterFinished: 86400