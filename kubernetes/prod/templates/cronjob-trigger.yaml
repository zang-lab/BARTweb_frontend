apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "bartweb.fullname" . }}-trigger-cronjob
  labels:
    {{- include "bartweb.labels" . | nindent 4 }}
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: bartweb-trigger-container
              image: ghcr.io/uvarc/uvarc-unified-service-base:develop
              imagePullPolicy: Always
              command: ["python3", "/BARTweb/trigger.py"]

              volumeMounts:
                - name: usercase-volume
                  mountPath: "/BARTweb/usercase"

              env:
                - name: USERID
                  value: "cz3d"

              resources:
                limits:
                  cpu: "0.5"
                  memory: 512Mi
                requests:
                  cpu: "0.5"
                  memory: 512Mi

          volumes:
            - name: usercase-volume
              persistentVolumeClaim:
                claimName: bartweb-usercase-pvc

          restartPolicy: OnFailure
      ttlSecondsAfterFinished: 86400