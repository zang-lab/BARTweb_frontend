apiVersion: batch/v1
kind: CronJob
metadata:
  name: bartweb-trigger-cronjob
  namespace: zanglab

spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Allow
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure

          containers:
            - name: trigger
              image: ghcr.io/uvarc/uvarc-unified-service-base:develop

              command:
                - python3
                - /BARTweb/usercase/trigger.py

              env:
                - name: USERID
                  value: "cz3d"

              resources:
                requests:
                  cpu: "500m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"

              volumeMounts:
                - name: trigger-file
                  mountPath: /BARTweb/usercase/trigger.py
                  subPath: trigger.py

                - name: ssh-key-volume
                  mountPath: /etc/ssh-key
                  readOnly: true

          volumes:
            - name: trigger-file
              hostPath:
                path: /standard/vol190/zanglab/trigger.py
                type: File

            - name: ssh-key-volume
              secret:
                secretName: cz3d-ssh-key
                defaultMode: 0400

          nodeSelector: {}
          tolerations: []
          affinity: {}