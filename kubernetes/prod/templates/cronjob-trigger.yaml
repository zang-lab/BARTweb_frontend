apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "bartweb.fullname" . }}-trigger-cronjob
  labels:
    {{- include "bartweb.labels" . | nindent 4 }}
spec:
  schedule: "*/5 * * * *"

  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: bartweb-trigger
              image: ghcr.io/uvarc/uvarc-unified-service-base:develop
              imagePullPolicy: Always

              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  
                  echo "Starting BARTweb trigger job..."
                  
                  # sanity checks
                  if [ ! -f /BARTweb/usercase/trigger.py ]; then
                    echo "ERROR: trigger.py not found"
                    exit 1
                  fi
                  
                  if [ ! -f /etc/ssh-key/id_rsa ]; then
                    echo "ERROR: SSH key missing"
                    exit 1
                  fi
                  
                  export PYTHONPATH=/BARTweb
                  
                  python3 /BARTweb/usercase/trigger.py

              volumeMounts:
                - name: ssh-key-volume
                  mountPath: /etc/ssh-key
                  readOnly: true

              env:
                - name: PYTHONUNBUFFERED
                  value: "1"

              resources:
                limits:
                  cpu: "0.5"
                  memory: 512Mi
                requests:
                  cpu: "0.5"
                  memory: 512Mi

          volumes:
            - name: ssh-key-volume
              secret:
                secretName: bartweb-ssh-key
                defaultMode: 0400

          restartPolicy: OnFailure

      ttlSecondsAfterFinished: 86400