apiVersion: batch/v1
kind: CronJob
metadata:
  name: bartweb-trigger-cronjob
  namespace: zanglab
spec:
  schedule: "0 * * * *"   # every hour

  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure

          containers:
            - name: bartweb-trigger-container
              image: ghcr.io/uvarc/uvarc-unified-service-base:develop
              imagePullPolicy: Always

              command:
                - python3
                - /BARTweb/usercase/trigger.py

              env:
                - name: USERID
                  value: "cz3d"

              resources:
                limits:
                  cpu: "0.5"
                  memory: 512Mi
                requests:
                  cpu: "0.5"
                  memory: 512Mi

              volumeMounts:
                - name: usercase-volume
                  mountPath: /BARTweb/usercase

                - name: ssh-key-volume
                  mountPath: /etc/ssh-key
                  readOnly: true

          volumes:
            - name: usercase-volume
              persistentVolumeClaim:
                claimName: bartweb-usercase-pvc

            - name: ssh-key-volume
              secret:
                secretName: cz3d-ssh-key
                defaultMode: 0400

          nodeSelector: {}